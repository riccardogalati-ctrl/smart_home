<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Casa Smart — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* simple toggle style */
    input.toggle { width:42px; height:24px; -webkit-appearance:none; background:#e5e7eb; border-radius:9999px; position:relative; outline:none; cursor:pointer; transition:background .2s }
    input.toggle:after { content:''; width:18px; height:18px; background:white; border-radius:9999px; position:absolute; top:3px; left:3px; box-shadow:0 1px 2px rgba(0,0,0,.2); transition:left .2s }
    input.toggle:checked { background:#3b82f6 }
    input.toggle:checked:after { left:21px }
  </style>
</head>
<body class="bg-gray-100 text-gray-800">
  <div class="max-w-8xl mx-auto p-6">
    <h1 class="text-2xl font-semibold mb-6">Casa Smart — Dashboard</h1>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- Left: main column (span 2) -->
      <div class="lg:col-span-2 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 items-stretch">
          <div class="bg-white p-3 rounded shadow col-span-1 flex flex-col justify-between" style="min-height:4.5rem;">
            <div>
              <div class="text-xs text-gray-500">Produzione (W)</div>
              <div id="production" class="text-xl font-bold">—</div>
            </div>
            <div id="weatherBox" class="mt-2 text-xs text-gray-600">Caricamento meteo...</div>
          </div>
          <div class="bg-white p-3 rounded shadow flex flex-col justify-between" style="min-height:4.5rem;">
            <div>
              <div class="text-xs text-gray-500">Consumo dispositivi (W)</div>
              <div id="consumption" class="text-xl font-bold">—</div>
            </div>
          </div>
          <div class="bg-white p-3 rounded shadow flex flex-col justify-between" style="min-height:4.5rem;">
            <div>
              <div class="text-xs text-gray-500">Delta rete (W)</div>
              <div id="grid_delta" class="text-xl font-bold">—</div>
            </div>
          </div>
        </div>

        <div class="bg-white p-3 rounded shadow">
          <h2 class="font-semibold mb-2 text-sm">Dispositivi Accesi</h2>
          <div id="activeDevices" class="space-y-1 text-sm">Caricamento...</div>
        </div>

        <div class="bg-white p-4 rounded shadow">
          <h2 class="font-semibold mb-3">Consumo vs Produzione</h2>
          <div class="w-full h-52">
            <canvas id="powerChart" class="w-full h-full"></canvas>
          </div>
        </div>
      </div>

      <!-- Right: controls -->
      <div class="space-y-6">
        <div class="bg-white p-3 rounded shadow">
          <h2 class="font-semibold mb-2 text-sm">Controllo Dispositivi</h2>
          <div id="devicesControl" class="space-y-2 text-sm">Caricamento...</div>
          <div class="mt-3 text-xs text-gray-500">Consumo Totale: <span id="totalLabel" class="font-semibold text-yellow-600">— W</span></div>
        </div>

        <div class="bg-white p-4 rounded shadow">
          <h2 class="font-semibold mb-3">Suggerimenti</h2>
          <div id="suggestions">In attesa di suggerimenti...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/app.js"></script>
</body>
</html>
